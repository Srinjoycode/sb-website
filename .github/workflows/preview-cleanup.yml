# =============================================================================
# PR Preview Cleanup — removes the temporary GitHub Pages preview directory
# when a pull request is closed (merged or dismissed).
# =============================================================================

name: Remove PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write       # push deletion to gh-pages branch
  pull-requests: write  # update the preview comment

jobs:
  remove-preview:
    name: Remove preview for PR #${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      DEPLOY_SUBDIR: pr-preview/pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Delete preview directory and push
        run: |
          if [ -d "$DEPLOY_SUBDIR" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$DEPLOY_SUBDIR"
            git commit -m "preview: remove PR #${PR_NUMBER} preview"
            git push
          else
            echo "Preview directory '${DEPLOY_SUBDIR}' not found — nothing to clean up."
          fi

      - name: Update PR comment to reflect removal
        uses: actions/github-script@v7
        with:
          script: |
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const prNum  = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNum,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- pr-preview -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: botComment.id,
                body: `<!-- pr-preview -->\n## 🔍 Live Preview\n\nThis PR has been closed — the temporary preview has been removed.`,
              });
            }
