# =============================================================================
# docker-compose.yml — Academic Portfolio
#
# Usage (local build):
#   docker compose up -d --build
#
# Homelab / Portainer deployment:
#   The image is built and pushed to GHCR by GitHub Actions on every push to
#   main.  Point Portainer at this compose file and let Watchtower handle
#   pulling the latest image automatically.
#
#   Image: ghcr.io/srinjoycode/sb-website:latest
# =============================================================================

version: "3.8"

services:
  portfolio:
    # Pull the pre-built image from GitHub Container Registry.
    # GitHub Actions builds and pushes this on every push to main.
    # To build locally instead, comment out `image` and uncomment `build`.
    image: ghcr.io/srinjoycode/sb-website:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: srinjoy-portfolio
    restart: unless-stopped

    # -------------------------------------------------------
    # Port mapping — change the host port if needed.
    # -------------------------------------------------------
    ports:
      - "8888:80"

    # Environment (optional overrides)
    environment:
      - TZ=America/Edmonton

    # Health check — uses curl (installed in the Docker image)
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Labels for Nginx Proxy Manager / Traefik (optional)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"   # Watchtower auto-update
      # Traefik labels (uncomment and customise if using Traefik)
      # - "traefik.enable=true"
      # - "traefik.http.routers.portfolio.rule=Host(`yourdomain.com`)"
      # - "traefik.http.routers.portfolio.entrypoints=websecure"

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
