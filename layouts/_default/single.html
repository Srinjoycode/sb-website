{{ define "main" }}
<div class="page-content section">
  <div class="container">
    <header class="page-header">
      <h1 class="page-header__title">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="page-header__desc">{{ . }}</p>
      {{ end }}
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</div>
{{ end }}
